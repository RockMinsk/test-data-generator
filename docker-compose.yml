version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: classicmodels-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: classicmodels
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/classicmodels.sql:/docker-entrypoint-initdb.d/classicmodels.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  tdg:
    build: .
    container_name: tdg-poc
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./config.json:/app/config.json
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: welcome
      DB_NAME: classicmodels
    command: ["config.json"]

volumes:
  mysql_data:
